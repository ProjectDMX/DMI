[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hf-prometheus"
version = "0.1.0"
description = "LLM monitoring with HuggingFace Transformers"
requires-python = ">=3.10"
dynamic = ["dependencies"]

[tool.setuptools.dynamic]
dependencies = { file = ["requirements.txt"] }

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
monitoring = ["csrc/*.cpp", "csrc/*.h", "csrc/*.hpp", "Makefile"]

[tool.setuptools.packages.find]
include = ["monitoring*", "benchmark*", "integration"]

[tool.pytest.ini_options]
markers = [
    "slow: tests that take more than ~30 s (per-hook isolation full sweep, large E2E sweeps); skipped by default unless `-m slow` is passed",
]
