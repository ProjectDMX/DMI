name: "Set up DMI"
description: >-
  Install DMI's Python deps + the modified Transformers fork, build the
  native backend (.so) and the ClickHouse C++ client, and (optionally) the
  vLLM fork. Importing `monitoring` loads the prebuilt native backend at
  import time (JIT is disabled), so the .so must be built even for the
  CPU-only suite -- which needs nvcc to compile, but no GPU at runtime.

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  install-vllm:
    description: "Also install the vLLM fork (heavy; only for vLLM E2E suites)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Show toolchain
      shell: bash
      run: |
        python --version
        nvcc --version || { echo "::error::nvcc not found -- the native backend cannot be built"; exit 1; }
        cmake --version

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Install the modified Transformers fork
      shell: bash
      run: pip install -e integration/transformers/

    - name: Install vLLM fork (optional)
      if: ${{ inputs.install-vllm == 'true' }}
      shell: bash
      run: pip install -e integration/vllm/

    - name: Build the ClickHouse C++ client
      shell: bash
      run: |
        cmake -S libs/clickhouse-cpp -B libs/clickhouse-cpp/build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_POSITION_INDEPENDENT_CODE=ON
        cmake --build libs/clickhouse-cpp/build -j

    - name: Build the DMI native backend
      shell: bash
      run: make -C monitoring -j

    - name: Install DMI (editable)
      shell: bash
      run: pip install -e . --no-build-isolation

    - name: Smoke-check the native backend loads
      shell: bash
      run: |
        python -c "import monitoring; print('monitoring:', monitoring.__file__)"
        python -c "from monitoring._native_engine import RingConfig; print(RingConfig())"
